<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPRAYZ VR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--or:#ff6b00;--pk:#ff0080;--pu:#7c00ff;--cy:#00cfff;--bg:#04040c;}
  body{background:var(--bg);overflow:hidden;font-family:'Share Tech Mono',monospace;}
  #overlay{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 35%,#0d0030 0%,#04040c 70%);overflow:hidden;
  }
  #overlay::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(rgba(0,207,255,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,207,255,.03) 1px,transparent 1px);
    background-size:55px 55px;animation:gd 18s linear infinite;
  }
  @keyframes gd{0%{transform:translateY(0)}100%{transform:translateY(55px)}}
  #overlay h1{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,10vw,6rem);letter-spacing:.1em;
    background:linear-gradient(135deg,var(--or),var(--pk),var(--pu),var(--cy));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 40px rgba(255,107,0,.45));animation:pu 3.5s ease-in-out infinite;
  }
  @keyframes pu{0%,100%{filter:drop-shadow(0 0 30px rgba(255,107,0,.4))}50%{filter:drop-shadow(0 0 70px rgba(255,0,128,.8))}}
  .tagline{color:#4a5566;font-size:.72rem;letter-spacing:.28em;margin-bottom:38px;text-transform:uppercase;}
  .map-strip{display:flex;align-items:center;gap:14px;margin-bottom:44px;flex-wrap:wrap;justify-content:center;color:#8899aa;font-size:.68rem;letter-spacing:.06em;}
  .map-strip .zone{padding:8px 16px;border:1px solid #1e2030;border-radius:8px;background:rgba(255,255,255,.02);text-align:center;}
  .map-strip .zone .zi{font-size:1.5rem;display:block;margin-bottom:3px;}
  .map-strip .sep{color:var(--or);font-size:1.1rem;}
  .vr-btn{
    padding:16px 52px;font-size:1.05rem;font-weight:bold;letter-spacing:.14em;
    border:2px solid var(--or);border-radius:40px;cursor:pointer;margin-bottom:8px;
    font-family:'Share Tech Mono',monospace;transition:all .3s;background:transparent;color:var(--or);
  }
  .vr-btn:hover{background:var(--or);color:#000;box-shadow:0 0 30px rgba(255,107,0,.6);}
  .vr-btn:disabled{border-color:#333;color:#444;cursor:not-allowed;}
  #status{font-size:.68rem;color:#445;letter-spacing:.1em;max-width:420px;text-align:center;padding:0 16px;}
  #canvas-wrap{display:none;position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}
  #hud{
    position:fixed;bottom:0;left:0;right:0;display:none;
    padding:10px 14px;background:linear-gradient(to top,rgba(4,4,12,.96),transparent);
    align-items:center;gap:8px;flex-wrap:wrap;
  }
  #color-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
  .cdot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;}
  .cdot:hover,.cdot.sel{transform:scale(1.4);border-color:#fff;}
  .tool-row{display:flex;gap:5px;}
  .tbtn{padding:4px 9px;border:1px solid #2a2a3a;border-radius:16px;background:rgba(0,0,0,.6);color:#666;cursor:pointer;font-size:.6rem;font-family:'Share Tech Mono',monospace;transition:all .2s;}
  .tbtn.active,.tbtn:hover{border-color:var(--or);color:var(--or);}
  .hbtn{padding:4px 10px;border:1px solid #2a2a3a;border-radius:16px;background:rgba(0,0,0,.6);color:#666;cursor:pointer;font-size:.6rem;font-family:'Share Tech Mono',monospace;transition:all .2s;}
  .hbtn:hover{border-color:var(--cy);color:var(--cy);}
  #size-wrap{display:flex;align-items:center;gap:5px;}
  #size-sl{-webkit-appearance:none;width:65px;height:3px;background:#1a1a2a;border-radius:2px;}
  #size-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--or);cursor:pointer;}
  #info{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(4,4,12,.85);border:1px solid #1a1a2a;border-radius:8px;
    padding:7px 14px;font-size:.58rem;color:#445;letter-spacing:.08em;
    display:none;pointer-events:none;text-align:center;white-space:nowrap;
  }
  #vr-info{
    position:fixed;top:0;left:0;right:0;display:none;
    padding:8px;background:rgba(0,0,0,.7);color:#ff6b00;
    font-size:.65rem;text-align:center;font-family:'Share Tech Mono',monospace;letter-spacing:.08em;
    pointer-events:none;z-index:5;
  }
</style>
</head>
<body>
<div id="overlay">
  <h1>SPRAYZ VR</h1>
  <p class="tagline">Metro - Sokak - Kopru Alti - Quest 3</p>
  <div class="map-strip">
    <div class="zone"><span class="zi">&#x1F687;</span>METRO</div>
    <div class="sep">--&gt;</div>
    <div class="zone"><span class="zi">&#x1F3D9;</span>SOKAK</div>
    <div class="sep">--&gt;</div>
    <div class="zone"><span class="zi">&#x1F309;</span>KOPRU ALTI</div>
  </div>
  <button class="vr-btn" id="vr-btn">&#x1F97D; VR'A GIR</button>
  <div id="status">WebXR kontrol ediliyor...</div>
</div>
<div id="canvas-wrap"><canvas id="gl"></canvas></div>
<div id="hud">
  <div id="color-row"></div>
  <div class="tool-row" id="tool-row"></div>
  <div id="size-wrap">
    <span style="font-size:.55rem;color:#444">BOY</span>
    <input type="range" id="size-sl" min="1" max="10" value="3">
  </div>
  <div style="display:flex;gap:5px;margin-left:auto;">
    <button class="hbtn" id="btn-undo">Geri</button>
    <button class="hbtn" id="btn-clear">Temizle</button>
    <button class="hbtn" id="btn-save">Kaydet</button>
    <button class="hbtn" id="btn-menu">Menu</button>
  </div>
</div>
<div id="info">Tik: Sprey | WASD: Yuru | E=Silgi F=Kalin D=Damla | Cift-tik overlay: desktop test</div>
<div id="vr-info">VR: Tetik=Sprey | Sol-Cubuk=Yuru | Sag-X=Don | Grip=Renk Degistir | Sol-Y=Menu</div>

<script>
setTimeout(function(){
  if(!window.__ok){
    var s=document.getElementById('status');
    if(s) s.textContent='Motor yuklenemedi. Internet / reklam engelleyici kontrol et.';
  }

</script>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {XRControllerModelFactory} from 'three/addons/webxr/XRControllerModelFactory.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
window.__ok = true;

// ── PALETTE & TOOLS ─────────────────────────────────────────────────
const PALETTE = [
  '#ff0000','#ff6b00','#ffcc00','#b5e300','#00e676',
  '#00cfff','#0088ff','#7c00ff','#ff00c8','#ffffff',
  '#111111','#ff4444','#a0522d','#00ffaa','#ff66cc','#ff3300'
];
const TOOLS = [
  {id:'spray', label:'SPRAY'},
  {id:'fat',   label:'KALIN'},
  {id:'drip',  label:'DAMLA'},
  {id:'line',  label:'CIZGI'},
  {id:'eraser',label:'SILGI'},
];

// ── GLOBALS ─────────────────────────────────────────────────────────
let renderer, scene, camera, cameraRig, composer;
let controllers = [], grips = [];
let spraySystem, audioSys, particles, vrMenu;
let isVR = false, _lastT = 0, _turnCD = false;
const cs = [
  {on:false, pp:new THREE.Vector3()},
  {on:false, pp:new THREE.Vector3()},
];
const keys = {};

// ── PROCEDURAL TEXTURES ─────────────────────────────────────────────
function cvTex(fn, sz) {
  sz = sz || 512;
  var c = document.createElement('canvas');
  c.width = c.height = sz;
  fn(c.getContext('2d'), sz);
  var t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function concreteTex(base) {
  base = base || '#888890';
  return cvTex(function(ctx, s) {
    ctx.fillStyle = base; ctx.fillRect(0,0,s,s);
    for(var i=0;i<10000;i++){
      var v = Math.random();
      ctx.fillStyle = 'rgba(0,0,0,'+(v*.14)+')';
      ctx.fillRect(Math.random()*s, Math.random()*s, 1.5, 1.5);
    }
    ctx.strokeStyle = 'rgba(0,0,0,.2)'; ctx.lineWidth = 1.5;
    for(var i=s/4; i<s; i+=s/4){
      ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(s,i); ctx.stroke();
    }
    for(var i=0;i<16;i++){
      var x = Math.random()*s;
      var g = ctx.createLinearGradient(x,0,x+3,s);
      g.addColorStop(0,'rgba(0,0,0,0)');
      g.addColorStop(1,'rgba(0,0,0,'+(Math.random()*.18)+')');
      ctx.fillStyle = g;
      ctx.fillRect(x, 0, Math.random()*5+2, s);
    }
  });
}

function brickTex(bCol, mCol) {
  bCol = bCol || '#8a5a42'; mCol = mCol || '#2a2a2a';
  return cvTex(function(ctx, s) {
    ctx.fillStyle = mCol; ctx.fillRect(0,0,s,s);
    var rows = 20, bw = s/9, bh = s/rows;
    for(var r=0; r<rows; r++){
      var off = (r%2) * bw * 0.5;
      for(var x=-bw; x<s+bw; x+=bw){
        var shade = 0.82 + Math.random()*0.36;
        var col = new THREE.Color(bCol); col.multiplyScalar(shade);
        ctx.fillStyle = '#'+col.getHexString();
        ctx.fillRect(x+off+1.5, r*bh+1.5, bw-3, bh-3);
      }
    }
  });
}

function asphaltTex() {
  return cvTex(function(ctx, s) {
    ctx.fillStyle = '#252528'; ctx.fillRect(0,0,s,s);
    for(var i=0; i<16000; i++){
      var g = Math.random()*35;
      ctx.fillStyle = 'rgba('+(g+25)+','+(g+25)+','+(g+28)+','+Math.random()*.4+')';
      ctx.fillRect(Math.random()*s, Math.random()*s, 1, 1);
    }
    ctx.strokeStyle = 'rgba(8,8,10,.7)'; ctx.lineWidth = 1;
    for(var c=0;c<4;c++){
      ctx.beginPath();
      var cx=Math.random()*s, cy=Math.random()*s;
      ctx.moveTo(cx,cy);
      for(var j=0;j<5;j++){cx+=Math.random()*40-20;cy+=Math.random()*40-20;ctx.lineTo(cx,cy);}
      ctx.stroke();
    }
  });
}

function tileTex() {
  return cvTex(function(ctx, s) {
    ctx.fillStyle = '#6a7888'; ctx.fillRect(0,0,s,s);
    var ts = s/8;
    for(var x=0; x<s; x+=ts) for(var y=0; y<s; y+=ts){
      var shade = 0.85 + Math.random()*0.3;
      var col = new THREE.Color('#6a7888'); col.multiplyScalar(shade);
      ctx.fillStyle = '#'+col.getHexString();
      ctx.fillRect(x+2, y+2, ts-4, ts-4);
    }
    ctx.strokeStyle = 'rgba(0,0,0,.4)'; ctx.lineWidth = 3;
    for(var i=0;i<=s;i+=ts){
      ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(s,i); ctx.stroke();
    }
  });
}

function rep(t, x, y){ t.repeat.set(x,y); return t; }

// ── MATERIAL HELPERS ────────────────────────────────────────────────
function matC(col, r, m, map){
  col = col||0x888888; r = r||0.9; m = m||0.02;
  return new THREE.MeshStandardMaterial({color:col, roughness:r, metalness:m, map:map||null});
}
function matM(col){
  return new THREE.MeshStandardMaterial({color:col||0x2a2a2a, roughness:.4, metalness:.85});
}
function matN(col){
  return new THREE.MeshStandardMaterial({
    color:col, emissive:new THREE.Color(col),
    emissiveIntensity:.9, roughness:.2, metalness:.1
  });
}
function matGrunge(){
  return new THREE.MeshBasicMaterial({color:0, transparent:true, depthWrite:false});
}

// ── GRUNGE OVERLAY ──────────────────────────────────────────────────
function addGrunge(sc, mesh, n){
  n = n||60;
  var box = new THREE.Box3().setFromObject(mesh);
  var sz  = new THREE.Vector3(); box.getSize(sz);
  var ctr = new THREE.Vector3(); box.getCenter(ctr);
  for(var i=0;i<n;i++){
    var w = Math.random()*.35+.04, h = Math.random()*.05+.005;
    var m2 = matGrunge(); m2.opacity = Math.random()*.28;
    var d = new THREE.Mesh(new THREE.PlaneGeometry(w,h), m2);
    d.position.set(
      ctr.x + (Math.random()-.5)*sz.x*.9,
      ctr.y + (Math.random()-.5)*sz.y*.9,
      ctr.z + sz.z*.502
    );
    d.rotation.z = Math.random()*Math.PI;
    sc.add(d);
  }
}

// ── INIT ────────────────────────────────────────────────────────────
function init(){
  var canvas = document.getElementById('gl');
  renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.xr.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0c18, .022);
  scene.background = new THREE.Color(0x0a0c18);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, .01, 300);
  camera.position.set(0, 1.65, 0);

  // Dolly / camera rig — allows thumbstick locomotion in VR
  cameraRig = new THREE.Group();
  cameraRig.add(camera);
  cameraRig.position.set(0, 0, 14);
  cameraRig.rotation.y = Math.PI;
  scene.add(cameraRig);

  buildWorld();

  spraySystem = new SpraySystem(scene);
  audioSys    = new AmbientAudio();
  particles   = new SprayParticles(scene);

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), .5, .45, .4
  ));

  document.getElementById('canvas-wrap').style.display = 'block';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('info').style.display = 'block';

  setupDesktopControls();
  buildHUD();
  window.addEventListener('resize', onResize);
  renderer.setAnimationLoop(render);
}

// ════════════════════════════════════════════════════════════════════
//  WORLD — Metro Girisi + Sokak + Kopru Alti (tek harita)
//  Z ekseni: +22 (metro arka) → 0 (sokak ortasi) → -40 (kopru bitis)
// ════════════════════════════════════════════════════════════════════
function buildWorld(){
  // Global lights
  scene.add(new THREE.HemisphereLight(0x6677bb, 0x221422, .8));
  var moon = new THREE.DirectionalLight(0x99aacc, .55);
  moon.position.set(20, 40, 0);
  moon.castShadow = true;
  moon.shadow.mapSize.set(2048,2048);
  moon.shadow.camera.near = 1; moon.shadow.camera.far = 130;
  moon.shadow.camera.left = -32; moon.shadow.camera.right = 32;
  moon.shadow.camera.top = 40; moon.shadow.camera.bottom = -40;
  scene.add(moon);

  buildGround();
  buildMetro();
  buildStreet();
  buildUnderpass();
  buildSkyline();
  buildStars();
}

// ── GROUND ──────────────────────────────────────────────────────────
function buildGround(){
  var asp = rep(asphaltTex(), 16, 40);
  var g = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 74),
    matC(0x252528, .88, .1, asp)
  );
  g.rotation.x = -Math.PI/2;
  g.position.set(0, 0, -9);
  g.receiveShadow = true;
  scene.add(g);

  // Sidewalk curbs
  [-9, 9].forEach(function(x){
    var c = new THREE.Mesh(new THREE.BoxGeometry(.55, .15, 74), matC(0xaaaaaa, .9, .02));
    c.position.set(x, .075, -9);
    c.receiveShadow = true;
    scene.add(c);
  });

  // Puddles
  for(var i=0; i<14; i++){
    var p = new THREE.Mesh(
      new THREE.CircleGeometry(.3 + Math.random()*.9, 24),
      new THREE.MeshStandardMaterial({color:0x334455, roughness:.04, metalness:.9, transparent:true, opacity:.65})
    );
    p.rotation.x = -Math.PI/2;
    p.position.set((Math.random()-.5)*12, .007, 18 - Math.random()*56);
    scene.add(p);
  }
}

// ── ZONE 1 : METRO GIRISI (z = +8 .. +22) ───────────────────────────
function buildMetro(){
  var ct  = rep(tileTex(), 4, 3);
  var ct2 = rep(concreteTex('#5a6070'), 5, 3);

  // Lights
  var data = [[0,4.5,14,4.5,16],[-5,4,17,3,14],[5,4,17,3,14]];
  data.forEach(function(d){
    var l = new THREE.PointLight(0xfff2cc, d[3], d[4]);
    l.position.set(d[0],d[1],d[2]); l.castShadow = true; scene.add(l);
  });
  var nA = new THREE.PointLight(0x00cfff, 2, 10);
  nA.position.set(0, 3.8, 13.5); scene.add(nA);
  var nS = new THREE.Mesh(new THREE.BoxGeometry(5,.08,.08), matN(0x00cfff));
  nS.position.set(0, 3.8, 13.5); scene.add(nS);

  // Back wall — big sprayable canvas
  var bw = new THREE.Mesh(new THREE.BoxGeometry(18, 5.6, .32), matC(0x6a7280, .85, .03, ct));
  bw.position.set(0, 2.8, 21.8);
  bw.userData.sprayable = true;
  bw.receiveShadow = bw.castShadow = true;
  scene.add(bw); addGrunge(scene, bw, 50);

  // Ceiling
  var ceil = new THREE.Mesh(new THREE.BoxGeometry(18,1,14), matC(0x383c48,.92,.01,ct2));
  ceil.position.set(0, 5.1, 15); scene.add(ceil);

  // Fluorescent lights
  [-6, -2, 2, 6].forEach(function(xi){
    var fb = new THREE.Mesh(new THREE.BoxGeometry(3,.08,.4),
      new THREE.MeshBasicMaterial({color:0xfff5d0}));
    fb.position.set(xi, 4.55, 15); scene.add(fb);
    var fl = new THREE.PointLight(0xfff5d0, 1.8, 8);
    fl.position.set(xi, 4.5, 15); scene.add(fl);
  });

  // Side walls (sprayable)
  [-9.1, 9.1].forEach(function(x){
    var w = new THREE.Mesh(new THREE.BoxGeometry(.3, 5.2, 14), matC(0x646e7c, .8, .02, ct));
    w.position.set(x, 2.6, 15);
    w.userData.sprayable = true;
    w.receiveShadow = w.castShadow = true;
    scene.add(w); addGrunge(scene, w, 20);
  });

  // Entrance arch
  [-3.2, 3.2].forEach(function(x){
    var post = new THREE.Mesh(new THREE.BoxGeometry(.28,4,.28), matM(0x1e2030));
    post.position.set(x, 2, 13.5); scene.add(post);
  });
  var beam = new THREE.Mesh(new THREE.BoxGeometry(6.8,.32,.4), matM(0x1e2030));
  beam.position.set(0, 4.05, 13.5); scene.add(beam);

  // Metro M sign
  var sC = document.createElement('canvas'); sC.width=256; sC.height=128;
  var sCtx = sC.getContext('2d');
  sCtx.fillStyle='#0a0c1e'; sCtx.fillRect(0,0,256,128);
  sCtx.fillStyle='#00cfff'; sCtx.font='bold 96px sans-serif';
  sCtx.textAlign='center'; sCtx.textBaseline='middle';
  sCtx.fillText('M',128,68);
  var sign = new THREE.Mesh(new THREE.PlaneGeometry(1.8,.9),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(sC), transparent:true}));
  sign.position.set(0, 4.75, 13.4); scene.add(sign);
  var sg = new THREE.PointLight(0x00cfff, 1.5, 5);
  sg.position.set(0, 4.75, 13); scene.add(sg);

  // Ticket kiosk
  var kiosk = new THREE.Mesh(new THREE.BoxGeometry(1.8,1.3,1.0), matC(0x404455,.7));
  kiosk.position.set(-2, .65, 10); kiosk.userData.sprayable=true; kiosk.castShadow=true;
  scene.add(kiosk);

  // Railings
  for(var z=9; z>=0; z-=2.2){
    [-2.6, 2.6].forEach(function(x){
      var post = new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.95,8), matM(0x44455a));
      post.position.set(x, .47, z); scene.add(post);
    });
    var rail = new THREE.Mesh(new THREE.BoxGeometry(5.6,.04,.04), matM(0x555566));
    rail.position.set(0, .9, z); scene.add(rail);
  }

  // Poster frames on back wall
  [[-5,2.5,21.65],[2,2.5,21.65]].forEach(function(d){
    var poster = new THREE.Mesh(new THREE.PlaneGeometry(1.8,2.4),
      new THREE.MeshStandardMaterial({
        color: Math.random()>.5 ? 0x220044 : 0x002244,
        roughness:.8,
        emissive: new THREE.Color(Math.random()>.5 ? 0x440088 : 0x004488),
        emissiveIntensity:.15
      }));
    poster.position.set(d[0],d[1],d[2]); scene.add(poster);
  });
}

// ── ZONE 2 : SOKAK (z = -20 .. +8) ────────────────────────────────
function buildStreet(){
  var brickL = rep(brickTex('#8a5a42'), 6, 2.5);
  var brickR = rep(brickTex('#5a6a70'), 6, 2.5);
  var brickF = rep(brickTex('#6a5848'), 4, 2);

  scene.add(new THREE.AmbientLight(0x3a3858, .5));

  // Street lamps

//  SPRAY PARTICLES
// ════════════════════════════════════════════════════════════════════
class SprayParticles {
  constructor(s){ this.scene=s; this.p=[]; }
  emit(pos, norm, col){
    var n = Math.floor(Math.random()*6)+4;
    for(var i=0;i<n;i++){
      var m = new THREE.Mesh(
        new THREE.SphereGeometry(.003+Math.random()*.006,4,4),
        new THREE.MeshBasicMaterial({color:col.clone(),transparent:true,opacity:.9,depthWrite:false})
      );
      m.position.copy(pos);
      m.userData.v = new THREE.Vector3(
        (Math.random()-.5)*.04, Math.random()*.03, (Math.random()-.5)*.04
      ).addScaledVector(norm,.025);
      m.userData.life=1;
      this.scene.add(m); this.p.push(m);
    }
  }
  update(dt){
    for(var i=this.p.length-1;i>=0;i--){
      var p=this.p[i];
      p.userData.life -= dt*2.2;
      p.userData.v.y  -= .5*dt;
      p.position.addScaledVector(p.userData.v,dt);
      p.material.opacity = Math.max(0, p.userData.life*.9);
      if(p.userData.life<=0){
        this.scene.remove(p); p.geometry.dispose(); p.material.dispose();
        this.p.splice(i,1);
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════════
//  SPRAY SYSTEM
// ════════════════════════════════════════════════════════════════════
class SpraySystem {
  constructor(s){
    this.scene=s; this.surfaces=[];
    this.color = new THREE.Color(PALETTE[0]);
    this.colorIdx=0; this.tool='spray'; this.size=.08;
    this.decals=[]; this.undoStack=[]; this.stroke=null; this.drips=[];
    this._scanT=Date.now();
    this._refresh();
  }
  _refresh(){
    this.surfaces=[];
    this.scene.traverse(function(o){ if(o.isMesh&&o.userData.sprayable) this.surfaces.push(o); }.bind(this));
  }
  setColor(h){ this.color=new THREE.Color(h); }
  cycleColor(d){
    this.colorIdx=(this.colorIdx+d+PALETTE.length)%PALETTE.length;
    this.color=new THREE.Color(PALETTE[this.colorIdx]);
  }
  setTool(t){ this.tool=t; }
  adjSize(d){ this.size=THREE.MathUtils.clamp(this.size+d,.012,.5); }

  sprayAt(pt, norm, obj, pSys){
    if(!this.stroke) this.stroke=[];
    if(this.tool==='eraser'){ this._erase(pt); return; }
    var n = (this.tool==='fat') ? 1 : this._cnt();
    for(var i=0;i<n;i++){
      var d=this._decal(pt,norm); if(d){ this.scene.add(d); this.decals.push(d); this.stroke.push(d); }
    }
    if(pSys&&Math.random()<.3) pSys.emit(pt,norm,this.color);
    if(this.tool==='drip'&&Math.random()<.28) this._drip(pt,norm);
  }

  endStroke(){
    if(this.stroke&&this.stroke.length){
      this.undoStack.push(this.stroke);
      if(this.undoStack.length>50){
        var old=this.undoStack.shift();
        old.forEach(function(d){ this.scene.remove(d);d.geometry.dispose();d.material.dispose(); }.bind(this));
      }
    }
    this.stroke=null;
  }

  undoLast(){
    if(!this.undoStack.length) return;
    var stroke=this.undoStack.pop();
    stroke.forEach(function(d){
      this.scene.remove(d); d.geometry.dispose(); d.material.dispose();
      var i=this.decals.indexOf(d); if(i>-1) this.decals.splice(i,1);
    }.bind(this));
  }

  clear(){
    this.decals.forEach(function(d){ this.scene.remove(d);d.geometry.dispose();d.material.dispose(); }.bind(this));
    this.decals=[]; this.undoStack=[]; this.stroke=null;
    this.drips.forEach(function(dr){ this.scene.remove(dr.m);dr.m.geometry.dispose();dr.m.material.dispose(); }.bind(this));
    this.drips=[];
  }

  update(dt){
    for(var i=this.drips.length-1;i>=0;i--){
      var dr=this.drips[i];
      dr.life-=dt;
      dr.v.y-=1.2*dt;
      dr.m.position.addScaledVector(dr.v,dt);
      dr.m.scale.y+=dt*.7;
      dr.m.material.opacity=Math.max(0,dr.life/dr.max*.9);
      if(dr.life<=0){
        this.scene.remove(dr.m);dr.m.geometry.dispose();dr.m.material.dispose();
        this.drips.splice(i,1);
      }
    }
    if(Date.now()-this._scanT>2000){ this._refresh(); this._scanT=Date.now(); }
  }

  _cnt(){
    if(this.tool==='spray') return Math.floor(this.size*140+12);
    if(this.tool==='drip')  return Math.floor(this.size*90+6);
    if(this.tool==='line')  return 4;
    return 8;
  }

  _decal(pt, norm){
    var p=pt.clone().addScaledVector(norm,.007);
    var geo;
    if(this.tool==='fat'){
      var s=this.size*(1.5+Math.random()*.5);
      geo=new THREE.PlaneGeometry(s,s);
    } else if(this.tool==='line'){
      geo=new THREE.CircleGeometry(this.size*.06,6);
    } else {
      var dist=Math.pow(Math.random(),.5)*this.size;
      var ang=Math.random()*Math.PI*2;
      var right=new THREE.Vector3().crossVectors(norm,new THREE.Vector3(0,1,0)).normalize();
      var up=new THREE.Vector3().crossVectors(right,norm).normalize();
      p.addScaledVector(right,Math.cos(ang)*dist);
      p.addScaledVector(up,Math.sin(ang)*dist);
      var ps=this.size*(.009+Math.random()*.02);
      geo=new THREE.CircleGeometry(ps,5);
    }
    var alpha=(this.tool==='fat') ? .88*(.5+Math.random()*.3) : .88*(.35+Math.random()*.6);
    var mat=new THREE.MeshBasicMaterial({
      color:this.color.clone(), transparent:true, opacity:alpha,
      depthWrite:false, polygonOffset:true, polygonOffsetFactor:-2, polygonOffsetUnits:-2
    });
    var mesh=new THREE.Mesh(geo,mat);
    mesh.position.copy(p);
    var q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1),norm);
    mesh.quaternion.copy(q);
    var spin=new THREE.Quaternion().setFromAxisAngle(norm,Math.random()*Math.PI*2);
    mesh.quaternion.premultiply(spin);
    return mesh;
  }

  _drip(pt, norm){
    var s=this.size*.045;
    var m=new THREE.Mesh(new THREE.CylinderGeometry(s*.4,s*.15,s*3,5),
      new THREE.MeshBasicMaterial({color:this.color.clone(),transparent:true,opacity:.88,depthWrite:false}));
    m.position.copy(pt).addScaledVector(norm,.008);
    m.lookAt(pt.clone().add(new THREE.Vector3(0,-1,0)));
    this.scene.add(m);
    this.drips.push({
      m:m,
      v:new THREE.Vector3((Math.random()-.5)*.02, -.06-Math.random()*.1, (Math.random()-.5)*.02),
      life:1.8+Math.random()*2, max:3.8
    });
  }

  _erase(pt){
    var r=this.size*1.5;
    for(var i=this.decals.length-1;i>=0;i--){
      if(this.decals[i].position.distanceTo(pt)<r){
        var d=this.decals[i];
        this.scene.remove(d); d.geometry.dispose(); d.material.dispose();
        this.decals.splice(i,1);
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════════
//  AMBIENT AUDIO
// ════════════════════════════════════════════════════════════════════
class AmbientAudio {
  constructor(){ this.ctx=null; this.gain=null; this.nodes=[]; this.on=false; }
  start(){
    if(this.on) return;
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      this.gain=this.ctx.createGain(); this.gain.gain.value=0;
      this.gain.connect(this.ctx.destination);
      this._drone(55,.28); this._drone(110,.14); this._hiss(.04);
      this._drone(28,.45); this._click(); this._wind(.03);
      this.gain.gain.linearRampToValueAtTime(.12, this.ctx.currentTime+3);
      this.on=true;
    }catch(e){ console.warn('Audio init fail',e); }
  }
  stop(){
    if(!this.ctx) return;
    this.gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime+1.5);
    setTimeout(function(){ this.ctx.close(); this.on=false; }.bind(this), 2000);
  }
  _drone(freq,vol){
    var osc=this.ctx.createOscillator(),g=this.ctx.createGain();
    osc.type='sine'; osc.frequency.value=freq;
    osc.detune.linearRampToValueAtTime(10, this.ctx.currentTime+16);
    osc.detune.linearRampToValueAtTime(-10, this.ctx.currentTime+32);
    g.gain.value=vol*.11; osc.connect(g); g.connect(this.gain); osc.start();
    this.nodes.push(osc,g);
  }
  _hiss(vol){
    var len=this.ctx.sampleRate*2;
    var buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    var d=buf.getChannelData(0); for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*.3;
    var src=this.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    var hp=this.ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=3800; hp.Q.value=.5;
    var g=this.ctx.createGain(); g.gain.value=vol;
    src.connect(hp); hp.connect(g); g.connect(this.gain); src.start();
    this.nodes.push(src,hp,g);
  }
  _wind(vol){
    var len=this.ctx.sampleRate*4;
    var buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
    var d=buf.getChannelData(0); for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    var src=this.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    var bp=this.ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=500; bp.Q.value=.3;
    var lfo=this.ctx.createOscillator(),lg=this.ctx.createGain();
    lfo.frequency.value=.06; lg.gain.value=vol*.5;
    var g=this.ctx.createGain(); g.gain.value=vol;
    lfo.connect(lg); lg.connect(g.gain);
    src.connect(bp); bp.connect(g); g.connect(this.gain);
    src.start(); lfo.start();
    this.nodes.push(src,bp,lfo,lg,g);
  }
  _click(){
    var self=this;
    function play(){
      if(!self.on) return;
      var buf=self.ctx.createBuffer(1,256,self.ctx.sampleRate);
      var d=buf.getChannelData(0);
      for(var i=0;i<256;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/20);
      var src=self.ctx.createBufferSource(); src.buffer=buf;
      var g=self.ctx.createGain(); g.gain.value=.025;
      var hp=self.ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=2500;
      src.connect(hp); hp.connect(g); g.connect(self.gain); src.start();
      setTimeout(play, 1800+Math.random()*1000);
    }
    setTimeout(play,2500);
  }
}

//  VR MENU (on left controller)
// ════════════════════════════════════════════════════════════════════
class VRMenu {
  constructor(s,sp){
    this.scene=s; this.spray=sp; this.root=new THREE.Group();
    this.visible=false; this._tp=false; this._trigP=false;
    this._build(); s.add(this.root); this.root.visible=false;
    this._buildOrb();
  }
  _build(){
    var bg=new THREE.Mesh(new THREE.PlaneGeometry(.34,.38),
      new THREE.MeshBasicMaterial({color:0x06071a,transparent:true,opacity:.92,side:THREE.DoubleSide}));
    this.root.add(bg);
    var edge=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(.34,.38)),
      new THREE.LineBasicMaterial({color:0xff6b00,transparent:true,opacity:.7}));
    this.root.add(edge);
    this._label('SPRAYZ VR',0,.155,.0095,0xff6b00);

    var cols=4,rows=4,sw=.06,gap=.008;
    var sx=-((cols-1)*(sw+gap))/2, sy=.07;
    PALETTE.forEach(function(c,i){
      if(i>=cols*rows) return;
      var col=i%cols, row=Math.floor(i/cols);
      var x=sx+col*(sw+gap), y=sy-row*(sw+gap);
      var m=new THREE.Mesh(new THREE.PlaneGeometry(sw,sw),
        new THREE.MeshBasicMaterial({color:new THREE.Color(c),side:THREE.DoubleSide}));
      m.position.set(x,y,.001);
      m.userData.colorValue=c; m.userData.isSwatch=true;
      this.root.add(m);
    }.bind(this));

    TOOLS.forEach(function(t,i){
      var x=-.12+i*.06;
      var btn=new THREE.Mesh(new THREE.PlaneGeometry(.055,.03),
        new THREE.MeshBasicMaterial({color:0x12132a,side:THREE.DoubleSide}));
      btn.position.set(x,-.11,.001);
      btn.userData.toolId=t.id; btn.userData.isTool=true;
      this.root.add(btn);
      this._label(t.id.slice(0,3).toUpperCase(),x,-.11,.0045,0x8899aa);
    }.bind(this));

    this.sizeRing=new THREE.Mesh(
      new THREE.RingGeometry(.012,.017,24),
      new THREE.MeshBasicMaterial({color:0xff6b00,side:THREE.DoubleSide})
    );
    this.sizeRing.position.set(.13,-.16,.001);
    this.root.add(this.sizeRing);
  }
  _label(text,x,y,size,color){
    var cv=document.createElement('canvas'); cv.width=256; cv.height=64;
    var ctx=cv.getContext('2d'); ctx.clearRect(0,0,256,64);
    ctx.fillStyle='#'+new THREE.Color(color).getHexString();
    ctx.font='bold 24px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text,128,32);
    var m=new THREE.Mesh(
      new THREE.PlaneGeometry(size*text.length*9,size*14),
      new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false,side:THREE.DoubleSide})
    );
    m.position.set(x,y,.002); this.root.add(m);
  }
  _buildOrb(){
    this.orb=new THREE.Mesh(new THREE.SphereGeometry(.032,12,8),
      new THREE.MeshBasicMaterial({color:0xff6b00,transparent:true,opacity:0}));
    this.orb.position.set(0,1.45,-.35); this.scene.add(this.orb); this._fade=0;
  }
  flash(){ this.orb.material.color.copy(this.spray.color); this.orb.material.opacity=1; this._fade=1; }
  toggle(){ this.visible=!this.visible; this.root.visible=this.visible; }
  update(ctrls, frame){
    var left=ctrls[1];
    if(left){
      var pos=new THREE.Vector3(), q=new THREE.Quaternion();
      left.getWorldPosition(pos); left.getWorldQuaternion(q);
      this.root.position.copy(pos).add(new THREE.Vector3(0,.1,-.14).applyQuaternion(q));
      this.root.quaternion.copy(q);
      var src=frame&&frame.session&&frame.session.inputSources[1];
      if(src&&src.gamepad){
        var yBtn=src.gamepad.buttons[3];
        if(yBtn&&yBtn.pressed&&!this._tp) this.toggle();
        this._tp=yBtn?yBtn.pressed:false;
      }
      if(this.visible&&ctrls[0]) this._ray(ctrls[0],frame);
    }
    if(this.sizeRing)
      this.sizeRing.scale.setScalar(THREE.MathUtils.clamp(this.spray.size/.08,.4,3.5));
    if(this._fade>0){
      this._fade-=.02;
      this.orb.material.opacity=Math.max(0,this._fade);
    }
  }
  _ray(ctrl, frame){
    var o=new THREE.Vector3(), d=new THREE.Vector3();
    ctrl.getWorldPosition(o); ctrl.getWorldDirection(d); d.negate();
    var ray=new THREE.Raycaster(o,d,0,2);
    var targets=this.root.children.filter(function(c){ return c.isMesh&&(c.userData.isSwatch||c.userData.isTool); });
    var hits=ray.intersectObjects(targets,false);
    if(hits.length){
      var obj=hits[0].object;
      var src=frame&&frame.session&&frame.session.inputSources[0];
      if(src&&src.gamepad){
        var tr=src.gamepad.buttons[0];
        if(tr&&tr.pressed&&!this._trigP){
          if(obj.userData.colorValue) this.spray.setColor(obj.userData.colorValue);
          if(obj.userData.toolId) this.spray.setTool(obj.userData.toolId);
        }
        this._trigP=tr?tr.pressed:false;
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════════
//  VR SESSION
// ════════════════════════════════════════════════════════════════════
async function startVR(){
  var statusEl=document.getElementById('status');
  var btn=document.getElementById('vr-btn');
  statusEl.textContent='Kontrol ediliyor...';
  btn.disabled=true;

  if(!navigator.xr){
    statusEl.textContent='WebXR yok. Quest tarayicisindan ac.';
    btn.disabled=false; return;
  }
  if(location.protocol!=='https:'&&location.hostname!=='localhost'){
    statusEl.textContent='VR icin HTTPS gerekli. GitHub Pages linki kullan.';
    btn.disabled=false; return;
  }

  try{
    var supported=await navigator.xr.isSessionSupported('immersive-vr');
    if(!supported){
      statusEl.textContent='Bu cihaz VR desteklemiyor. Quest Browser kullan.';
      btn.disabled=false; return;
    }
  }catch(e){
    // isSessionSupported failed — try anyway
  }

  if(!renderer) init();

  statusEl.textContent='VR oturumu aciliyor...';

  var session;
  try{
    session=await navigator.xr.requestSession('immersive-vr',{
      requiredFeatures:['local-floor'],
      optionalFeatures:['bounded-floor']
    });
  }catch(err1){
    try{
      session=await navigator.xr.requestSession('immersive-vr',{
        optionalFeatures:['local-floor','bounded-floor']
      });
    }catch(err2){
      statusEl.textContent='VR acilamadi: '+(err2.message||err2.name||'bilinmeyen hata');
      btn.disabled=false; return;
    }
  }

  try{ audioSys.start(); }catch(e){}

  await renderer.xr.setSession(session);
  isVR=true;

  document.getElementById('overlay').style.display='none';
  document.getElementById('canvas-wrap').style.display='block';
  document.getElementById('hud').style.display='none'; // no 2D HUD in VR
  document.getElementById('info').style.display='none';
  document.getElementById('vr-info').style.display='block';

  vrMenu=new VRMenu(scene, spraySystem);
  setupControllers();

  session.addEventListener('end',function(){
    isVR=false; controllers=[]; grips=[];
    document.getElementById('overlay').style.display='flex';
    document.getElementById('vr-info').style.display='none';
    btn.disabled=false;
    statusEl.textContent='VR oturumu sona erdi. Tekrar girebilirsin.';
    try{ audioSys.stop(); }catch(e){}
  });
}

// ── CONTROLLERS (no hand tracking — virtual controllers only) ──────
function setupControllers(){
  var mf=new XRControllerModelFactory();
  for(var i=0;i<2;i++){
    (function(idx){
      var ctrl=renderer.xr.getController(idx);
      ctrl.userData.idx=idx;
      scene.add(ctrl); controllers.push(ctrl);

      // Neon aim ray
      var ray=new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-1)]),
        new THREE.LineBasicMaterial({color:idx===0?0xff6b00:0x00cfff, transparent:true, opacity:.5})
      );
      ray.scale.z=.5; ctrl.add(ray);

      // Spray nozzle cone on right controller
      if(idx===0){
        var nozzle=new THREE.Mesh(new THREE.ConeGeometry(.014,.045,8),
          new THREE.MeshBasicMaterial({color:0xff6b00}));
        nozzle.rotation.x=Math.PI/2; nozzle.position.set(0,0,-.065);
        ctrl.add(nozzle);
        var bead=new THREE.Mesh(new THREE.SphereGeometry(.009,8,8),
          new THREE.MeshBasicMaterial({color:0xff6b00}));
        bead.position.set(0,0,-.09);
        ctrl.add(bead); ctrl.userData.bead=bead;
      }

      ctrl.addEventListener('selectstart', function(){ onTrig(idx,true); });
      ctrl.addEventListener('selectend',   function(){ onTrig(idx,false); });
      ctrl.addEventListener('squeezestart',function(){ onGrip(idx,true); });
      ctrl.addEventListener('squeezeend',  function(){ onGrip(idx,false); });

      var grip=renderer.xr.getControllerGrip(idx);
      grip.add(mf.createControllerModel(grip));
      scene.add(grip); grips.push(grip);
    })(i);
  }
}

function onTrig(i, down){
  cs[i].on=down;
  if(!down) spraySystem.endStroke();
}
function onGrip(i, down){
  if(down){
    spraySystem.cycleColor(i===0?1:-1);
    vrMenu&&vrMenu.flash();
    if(controllers[i]&&controllers[i].userData.bead)
      controllers[i].userData.bead.material.color.copy(spraySystem.color);
  }
}

// ════════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════════════════════════
var _rOrig=new THREE.Vector3(), _rDir=new THREE.Vector3();
var _rc=new THREE.Raycaster();

function render(ts, frame){
  var dt=Math.min((_lastT ? ts-_lastT : 16)/1000, .05);
  _lastT=ts;

  if(isVR&&frame){
    // Right controller (0) = spray
    var ctrl0=controllers[0];
    if(ctrl0&&cs[0].on){
      ctrl0.getWorldPosition(_rOrig);
      ctrl0.getWorldDirection(_rDir); _rDir.negate();
      _rc.set(_rOrig,_rDir); _rc.far=8;
      var hits=_rc.intersectObjects(spraySystem.surfaces,false);
      if(hits.length)
        spraySystem.sprayAt(hits[0].point, hits[0].face.normal, hits[0].object, particles);
    }

    // Gamepad input
    for(var i=0;i<controllers.length;i++){
      var src=frame.session.inputSources[i];
      if(!src||!src.gamepad) continue;
      var axes=src.gamepad.axes;

      if(i===1&&axes.length>=4){
        // Left stick — locomotion
        var lx=axes[2], lz=axes[3];
        if(Math.abs(lx)>.15||Math.abs(lz)>.15){
          var yaw=cameraRig.rotation.y;
          var sinY=Math.sin(yaw), cosY=Math.cos(yaw);
          cameraRig.position.x+=(lx*cosY+lz*sinY)*2.8*dt;
          cameraRig.position.z+=(-lx*sinY+lz*cosY)*2.8*dt;
        }
      }
      if(i===0&&axes.length>=4){
        // Right stick Y — brush size
        var dy=-axes[3];
        if(Math.abs(dy)>.3) spraySystem.adjSize(dy*.003);
        // Right stick X — snap turn
        var dx=axes[2];
        if(Math.abs(dx)>.6&&!_turnCD){
          cameraRig.rotation.y-=Math.sign(dx)*Math.PI/4;
          _turnCD=true; setTimeout(function(){ _turnCD=false; },280);
        }
      }
    }

    vrMenu&&vrMenu.update(controllers,frame);
  }

  // Desktop walk (WASD)
  if(!isVR&&renderer){
    var spd=5;
    var fwd=new THREE.Vector3(0,0,-1).applyQuaternion(cameraRig.quaternion);
    var right=new THREE.Vector3(1,0,0).applyQuaternion(cameraRig.quaternion);
    if(keys['w']||keys['arrowup'])    cameraRig.position.addScaledVector(fwd,spd*dt);
    if(keys['s']||keys['arrowdown'])  cameraRig.position.addScaledVector(fwd,-spd*dt);
    if(keys['a'])                      cameraRig.position.addScaledVector(right,-spd*dt);
    if(keys['d'])                      cameraRig.position.addScaledVector(right,spd*dt);
    if(keys['arrowleft'])              cameraRig.rotation.y+=.04;
    if(keys['arrowright'])             cameraRig.rotation.y-=.04;
  }

  spraySystem&&spraySystem.update(dt);
  particles&&particles.update(dt);

  if(isVR) renderer.render(scene,camera);
  else composer&&composer.render();
}

// ════════════════════════════════════════════════════════════════════
//  DESKTOP CONTROLS
// ════════════════════════════════════════════════════════════════════
var _mouse=new THREE.Vector2();
var _dDrawing=false;

function setupDesktopControls(){
  var cv=document.getElementById('gl');
  cv.addEventListener('mousedown',function(e){ _dDrawing=true; _dDraw(e); });
  cv.addEventListener('mousemove',function(e){ if(_dDrawing) _dDraw(e); });
  cv.addEventListener('mouseup',function(){ _dDrawing=false; spraySystem.endStroke(); });
  cv.addEventListener('contextmenu',function(e){ e.preventDefault(); });
  cv.addEventListener('touchstart',function(e){ e.preventDefault();_dDrawing=true;_dDraw(e.touches[0]); },{passive:false});
  cv.addEventListener('touchmove',function(e){ e.preventDefault();if(_dDrawing)_dDraw(e.touches[0]); },{passive:false});
  cv.addEventListener('touchend',function(){ _dDrawing=false;spraySystem.endStroke(); });
  window.addEventListener('keydown',function(e){
    keys[e.key.toLowerCase()]=true;
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); spraySystem.undoLast(); }
    if(e.key==='s'&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); saveShot(); }
    if(e.key==='e') setTool('eraser');
    if(e.key==='f') setTool('fat');
    if(e.key==='r') setTool('drip');
    if(e.key==='q') setTool('spray');
    if(e.key==='l') setTool('line');
  });
  window.addEventListener('keyup',function(e){ keys[e.key.toLowerCase()]=false; });
}

function _dDraw(e){
  var cv=document.getElementById('gl');
  var rect=cv.getBoundingClientRect();
  _mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  _mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  var ray=new THREE.Raycaster();
  ray.setFromCamera(_mouse,camera);
  var hits=ray.intersectObjects(spraySystem.surfaces,false);
  if(hits.length) spraySystem.sprayAt(hits[0].point,hits[0].face.normal,hits[0].object,particles);
}

// ── HUD ─────────────────────────────────────────────────────────────
function buildHUD(){
  var row=document.getElementById('color-row');
  PALETTE.forEach(function(c,i){
    var d=document.createElement('div');
    d.className='cdot'+(i===0?' sel':'');
    d.style.background=c; d.title=c;
    d.onclick=function(){
      document.querySelectorAll('.cdot').forEach(function(x){ x.classList.remove('sel'); });
      d.classList.add('sel'); spraySystem.setColor(c);
    };
    row.appendChild(d);
  });
  var cp=document.createElement('input');
  cp.type='color'; cp.value='#ff6b00';
  cp.style.cssText='width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;padding:0;background:none;';
  cp.oninput=function(e){ spraySystem.setColor(e.target.value); };
  row.appendChild(cp);

  var tr=document.getElementById('tool-row');
  TOOLS.forEach(function(t){
    var btn=document.createElement('button');
    btn.className='tbtn'+(t.id==='spray'?' active':'');
    btn.textContent=t.label;
    btn.onclick=function(){
      document.querySelectorAll('.tbtn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active'); setTool(t.id);
    };
    tr.appendChild(btn);
  });
}

function setTool(id){
  spraySystem.setTool(id);
  document.querySelectorAll('.tbtn').forEach(function(b){
    b.classList.toggle('active',
      (id==='spray'&&b.textContent==='SPRAY')||
      (id==='fat'&&b.textContent==='KALIN')||
      (id==='drip'&&b.textContent==='DAMLA')||
      (id==='line'&&b.textContent==='CIZGI')||
      (id==='eraser'&&b.textContent==='SILGI')
    );
  });
}

function onResize(){
  if(!renderer) return;
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  composer&&composer.setSize(window.innerWidth,window.innerHeight);
}

function saveShot(){
  if(!renderer) return;
  renderer.render(scene,camera);
  var a=document.createElement('a');
  a.download='sprayz-vr.png';
  a.href=renderer.domElement.toDataURL('image/png');
  a.click();
}

function backToMenu(){
  document.getElementById('canvas-wrap').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('info').style.display='none';
  document.getElementById('overlay').style.display='flex';
}

// Wire buttons
function wireButtons(){
  document.getElementById('vr-btn')&&document.getElementById('vr-btn').addEventListener('click',startVR);
  document.getElementById('btn-undo')&&document.getElementById('btn-undo').addEventListener('click',function(){ spraySystem&&spraySystem.undoLast(); });
  document.getElementById('btn-clear')&&document.getElementById('btn-clear').addEventListener('click',function(){ spraySystem&&spraySystem.clear(); });
  document.getElementById('btn-save')&&document.getElementById('btn-save').addEventListener('click',saveShot);
  document.getElementById('btn-menu')&&document.getElementById('btn-menu').addEventListener('click',backToMenu);
  document.getElementById('size-sl')&&document.getElementById('size-sl').addEventListener('input',function(e){ spraySystem&&spraySystem.adjSize((e.target.value-5)*.001); });
  // Double-click overlay for desktop test mode
  document.getElementById('overlay')&&document.getElementById('overlay').addEventListener('dblclick',function(){
    document.getElementById('overlay').style.display='none';
    if(!renderer) init();
    document.getElementById('canvas-wrap').style.display='block';
    document.getElementById('hud').style.display='flex';
    document.getElementById('info').style.display='block';
  });
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',wireButtons);
} else {
  wireButtons();
}

// XR availability check
(async function(){
  var statusEl=document.getElementById('status');
  if(!navigator.xr){
    statusEl.textContent='WebXR yok. Quest Browser ile ac (HTTPS gerekli).';
    return;
  }
  try{
    var ok=await navigator.xr.isSessionSupported('immersive-vr');
    statusEl.textContent=ok
      ? 'VR hazir! "VR\'A GIR" butonuna bas.'
      : 'Quest Browser kullan (immersive-vr desteklenmiyor).';
  }catch(e){
    statusEl.textContent='VR durumu kontrol edilemedi — yine de dene.';
  }
})();
